################################################################################
# SECTION 3: CROSS-ENGINE INTERACTION MATRIX
################################################################################

# For each pair of engines, document:
#   - coupling mechanism (direct? field? multiplicative? gating?)
#   - sign (push/pull)
#   - magnitude knob (which YAML constants govern it)
#   - timescale (per tick vs long-term)
#   - instability risk (runaway vs damping)

cross_engine_interactions:
  
  - source: "Fatigue_Lock_Engine"
    target: "EMX_Emotional_Weather_Engine"
    mechanism: "Target modulation"
    description: |
      zone_fatigue directly increases Disgust and Anger targets.
      Disgust target += fatigue×0.7
      Anger target += fatigue×0.2
    sign: "push (fatigue → higher Disgust/Anger)"
    magnitude_knobs:
      - disgust_weight: 0.7
      - anger_weight: 0.2
    timescale: "per_tick (immediate)"
    feedback_character: "self-reinforcing positive feedback (slower emotional feedback → faster fatigue)"
    instability_risk: "MEDIUM (can produce lock-escape resonance if Disgust threshold is low)"
    
  - source: "EMX_Emotional_Weather_Engine"
    target: "Fatigue_Lock_Engine"
    mechanism: "Fatigue accumulation rate modulation"
    description: |
      zone_fatigue += max(0.1, 1.0 − Acceptance×0.3 + Disgust×0.4)
      High Disgust speeds fatigue accumulation.
      High Acceptance slows it.
    sign: "bidirectional (Disgust pushes fatigue up; Acceptance pulls down)"
    magnitude_knobs:
      - acceptance_dampening: 0.3
      - disgust_acceleration: 0.4
      - baseline_accumulation: 0.1
    timescale: "per_tick"
    feedback_character: "circular (fatigue → Disgust ↑ → faster fatigue ↑)"
    instability_risk: "HIGH (circular positive feedback on Disgust side)"
    migration_consequence: |
      When zone_fatigue > 500, forced zone change → NPC moves → Surprise
      spike → Acceptance rises briefly → fatigue accumulation slows briefly
      → Surprise decays → cycle repeats.
      This is an oscillatory lock-release dynamic.
    
  - source: "Zone_Economy_Scoring_Engine"
    target: "EMX_Emotional_Weather_Engine"
    mechanism: "Indirectly through zone selection"
    description: |
      Market demand and congestion multiply zone scores.
      This affects which zone NPC chooses.
      Zone choice → EMX raw targets change (different zone → energy/money/stress rates differ)
    sign: "push (high demand/low congestion pulls NPCs toward that zone)"
    magnitude_knobs:
      - market_demand_jitter: [0.8, 1.2]
      - congestion_penalty_strength: 0.6
    timescale: "1-tick effect (market jitter); 50+ ticks emergent clustering"
    feedback_character: "broadcast clustering (all NPCs move toward same zone → congestion ↑ → penalty ↑ → NPCs disperse)"
    instability_risk: "LOW-MEDIUM (crowding is self-regulating, but jitter can create false peaks)"
    
  - source: "Hard_Constraint_Gate_Engine"
    target: "Zone_Economy_Scoring_Engine"
    mechanism: "Option removal (upstream of scoring)"
    description: |
      Gates remove zones from consideration before scoring happens.
      If energy < 40, SCIENCE and DEVELOPMENT are removed entirely.
      Zone_Economy can only score remaining zones.
    sign: "restrictive (gate limits which zones are even evaluated)"
    magnitude_knobs:
      - energy_critical_threshold: 25
      - energy_partial_threshold: 40
      - money_critical_threshold: 10
      - stress_threshold: 50 + stress_tolerance×40
    timescale: "per_tick (instantaneous)"
    feedback_character: "stabilizing (prevents bad decisions during resource scarcity)"
    instability_risk: "LOW (gates are deterministic and prevent oscillation)"
    
  - source: "Hard_Constraint_Gate_Engine"
    target: "EMX_Emotional_Weather_Engine"
    mechanism: "Forced zone choice (overrides emotional preference)"
    description: |
      If energy < 25, only HOME is available.
      NPC must go HOME regardless of EMX state.
      This forces EMX trajectories toward recovery (HOME is safe, no fatigue).
    sign: "push (toward HOME during crisis)"
    magnitude_knobs:
      - energy_critical_threshold: 25
    timescale: "per_tick"
    feedback_character: "stabilizing (breaks runaway decay spirals)"
    instability_risk: "NONE (by design; this is the fail-safe)"
    
  - source: "EMX_Emotional_Weather_Engine"
    target: "Hard_Constraint_Gate_Engine"
    mechanism: "Stress accumulation → gate tightening"
    description: |
      Stress affects the stress_threshold for DEV/TRADE blocking.
      stress > (50 + stress_tolerance×40) → blocks DEV and TRADE.
      EMX doesn't directly increase stress, but Anger/Sadness in work
      output increases stress penalty.
    sign: "indirect push (high stress reduces accessible zones)"
    magnitude_knobs:
      - stress_threshold_base: 50
      - stress_tolerance_multiplier: 40
    timescale: "50+ ticks (stress accumulation is slow)"
    feedback_character: "self-limiting (high stress removes options → less work → stress recovery)"
    instability_risk: "LOW-MEDIUM (can oscillate between locked/unlocked if stress hovers near threshold)"
    
  - source: "Spatial_Cell_Diffusion_Engine"
    target: "EMX_Emotional_Weather_Engine"
    mechanism: "Cell absorption into emx"
    description: |
      cell_atmosphere[cell][e] is absorbed into npc.emx at 0.0009 rate.
      This is 3× stronger than zone absorption (0.0003).
      Local cell spikes can dominate emx updates.
    sign: "push (cell atmosphere biases emx toward local gradient)"
    magnitude_knobs:
      - cell_absorb_rate: 0.0009
      - zone_absorb_rate: 0.0003
      - rate_ratio: 3.0
    timescale: "1–10 ticks (cells diffuse faster than zones)"
    feedback_character: "field-mediated coupling (emx → cell → emx, creating micro-clusters)"
    instability_risk: "MEDIUM (if cells are small and NPCs are sparse, can amplify local noise)"
    
  - source: "EMX_Emotional_Weather_Engine"
    target: "Spatial_Cell_Diffusion_Engine"
    mechanism: "Emission into cell atmosphere"
    description: |
      NPCs emit emx[e] to their cell at same rate as zone emission (0.0008).
      Cells diffuse to neighbors.
      Cell[e] receives contributions from all NPCs in that cell AND from neighboring cells.
    sign: "push (emx → cell atmosphere; cell → neighbor cells)"
    magnitude_knobs:
      - emit_rate: 0.0008
      - cell_diffusion_rate: implied
    timescale: "1–10 ticks"
    feedback_character: "resonant (NPCs in cell → cell atmosphere ↑ → absorption back into NPCs)"
    instability_risk: "MEDIUM (spatial feedback can create local resonances if cell size is small)"
    
  - source: "Zone_Economy_Scoring_Engine"
    target: "Fatigue_Lock_Engine"
    mechanism: "Indirectly through zone choice"
    description: |
      Market demand and congestion affect zone selection.
      Different zones have different fatigue accumulation rates
      (only the base 0.0005/tick AT_WORK energy drain is constant).
      So zone choice → fatigue trajectory over time.
    sign: "push (clustering toward high-demand zones → different fatigue exposure)"
    magnitude_knobs:
      - market_demand_jitter: [0.8, 1.2]
      - congestion_penalty_strength: 0.6
    timescale: "50–200 ticks (fatigue accumulation timescale)"
    feedback_character: "indirect (not directly coupled)"
    instability_risk: "LOW (decoupled by fatigue's slow timescale)"

################################################################################
# SECTION 4: HAZARD REGISTRY (Known Distortions in Baseline)
################################################################################

# These are features of the current system that are undeniable parts of the
# baseline regime but may be intended or unintended. They must be explicitly
# decided before any implementation changes.

hazards:
  
  - hazard_id: "H1"
    name: "Disgust_Double_Penalty_Stacking"
    severity: "HIGH"
    decision_status: "DECISION_REQUIRED"
    observed_behavior: |
      In NPC decision logic (decide_intent), Disgust is applied twice:
      1. First pass (line ~962): score -= 0.5 * disgust
      2. Second pass (line ~1010): score -= 1.5 * disgust
      Net effect on current zone: ≈ −2.0×Disgust
    quantified_effect: |
      For an NPC with Disgust = 0.8 in current zone:
      Penalty = −2.0 × 0.8 = −1.6 score.
      This is larger than any other emotion modifier.
    regime_shaping_impact: |
      This penalty significantly alters:
      - Churn rate (NPCs flee zones faster)
      - Lock waves (zones cycle through high disgust more violently)
      - Exploration vs retention equilibrium (escape is overstimulated)
      - Effective strength of "rejecting" zone complexes
    baseline_classification: "DECIDED (see below)"
    decision: |
      [USER DECISION REQUIRED]
      Is this double-stacking CANONICAL baseline physics or an ARTIFACT?
      
      If CANONICAL:
        - Retain it as-is
        - Calibrate all other mechanisms around it
        - Document it in the interaction matrix as intentional
      
      If ARTIFACT:
        - Remove it in the first post-baseline patch
        - Recalibrate fatigue-driven escape and zone-switching dynamics
        - Expected impact: longer zone residence, lower churn, higher lock resistance
    current_documentation: "Explicitly flagged in NPC INFLUENCE & INTERDEPENDENCY MAP, §IV"
    
  - hazard_id: "H2"
    name: "Market_Demand_Random_Jitter"
    severity: "MEDIUM"
    decision_status: "ACCEPTED_AS_BASELINE"
    observed_behavior: |
      Every tick, market_demand is randomly resampled: [0.8, 1.2].
      score[zone] *= market_demand
    quantified_effect: |
      The 0.4 span (0.8–1.2) creates ±20% variance in zone attractiveness
      every single tick, independent of system state.
    regime_shaping_impact: |
      - Injects permanent noise into zone scoring
      - Prevents stable ranking (optimal zone can change by jitter alone)
      - NPCs cannot optimize zone choice; only respond to noise
      - Creates "false peaks" that pull NPCs into temporarily attractive zones
    baseline_classification: "ACCEPTED (treating as market reality, not noise)"
    note: |
      This is realistic if interpreted as "markets fluctuate unpredictably".
      However, it prevents any true optimization or learning on zone choice.
      This is part of baseline behavior; any post-baseline analysis must account for it.
    
  - hazard_id: "H3"
    name: "Event_Engine_Disconnected"
    severity: "MEDIUM"
    decision_status: "DECISION_REQUIRED"
    observed_behavior: |
      active_events is tracked per NPC and passed to compute_work_result.
      However, the multipliers are never applied. The function receives
      active_events but doesn't use them in work delta calculations.
    current_state: "The engine exists structurally but has no behavioral output."
    baseline_classification: "GHOST ENGINE (defined but dormant)"
    decision: |
      [USER DECISION REQUIRED]
      Is this intentional (planned for later) or unintended (incomplete)?
      
      If intentional (dormant on purpose):
        - Document it as "reserved for future expansion"
        - Do not apply event multipliers yet
      
      If unintended (incomplete implementation):
        - This is a baseline defect, not a feature
        - Post-baseline correction would implement event→multiplier application
    
  - hazard_id: "H4"
    name: "Trust_Social_Influence_Stub"
    severity: "HIGH"
    decision_status: "DECISION_REQUIRED"
    observed_behavior: |
      compute_influence_delta returns InfluenceDelta with all deltas = 0.
      No NPC reads another NPC's trust_log, commitment, or state.
      Window title advertises "Trust System v2.0" but implementation is missing.
    structural_artifacts: |
      - trust_log deque exists, can be populated, but is never read
      - commitments are written by apply_commit_reality but never read back
      - social_sensitivity and anchoring_authority are derived but never used in scoring
    baseline_classification: "STRUCTURAL STUB"
    current_coupling: |
      The ONLY NPC-to-NPC influence is INDIRECT: shared zone_atmosphere.
      All peer dynamics are field-mediated, not relational.
    decision: |
      [USER DECISION REQUIRED]
      Is this intentional (trust system reserved for future) or unintended (incomplete)?
      
      Current baseline does NOT include:
        - Reputation propagation
        - Social reinforcement
        - Alliance clustering
        - Peer imitation
        - Trade dependency graphs
      
      If you want these, they must come via post-baseline implementation.
    
  - hazard_id: "H5"
    name: "Orphaned_NPC_Fields"
    severity: "LOW"
    decision_status: "DOCUMENTED"
    observed_behavior: |
      health, basic_needs are defined in NPC dataclass.
      They are initialized (health=1.0, basic_needs=100.0).
      They are NEVER modified and NEVER read in any simtick phase.
    listed_orphans: [health, basic_needs, long_term_commitments, risk_absorptions, exchange_actions]
    baseline_classification: "CALIBRATION HAZARDS (look like state but don't participate)"
    impact: |
      - They consume memory but contribute nothing to dynamics
      - Future code might accidentally read them, causing bugs
      - They create false impression of system completeness
    decision: |
      In post-baseline corrections, you can choose to:
      1. Remove them (reduce cognitive load)
      2. Activate them (implement their logic)
      3. Leave them (backward compatibility)
      
      For baseline certification, they are documented as INERT.

################################################################################
# SECTION 5: PLATEAU DEFINITION (What We Mean by "Swiss-Watch Stable")
################################################################################

# The plateau is certified by observing system-wide metrics under canonical
# operation. We are NOT chasing "best behavior". We are certifying "known
# regime under known couplings".

plateau:
  
  philosophy: |
    A "Swiss watch" is stable, internally coupled, and predictable in its
    oscillations. The plateau is the regime where all engines are running at
    their design point, producing observable steady-state (or quasi-steady-state)
    distributions.
    
    We do NOT measure "optimal behavior" — we measure "expected behavior".
  
  observation_window: "500–10000 ticks (long enough for fatigue cycles to complete)"
  
  stationary_distributions:
    
    - metric: "zone_densities"
      description: "Mean population per zone over observation window"
      measurement: "mean ± std of (population[z] / total_population) for z in [HOME, SCIENCE, TRADE, DEV, FLEX]"
      stability_criterion: |
        Distribution should be stationary (no systematic drift).
        For a baseline with no artificial biases, we expect HOME to have
        higher density (safe default) but other zones should have non-zero
        occupancy (engines are driving exploration).
      acceptable_range: |
        HOME: 0.35–0.55 (majority at HOME is healthy)
        SCIENCE: 0.08–0.18
        TRADE: 0.08–0.18
        DEV: 0.08–0.18
        FLEX: 0.08–0.18
        These ranges are estimates; actual baseline values become the new "normal".
      
    - metric: "mean_emx_saturation"
      description: "Fraction of NPCs with EMX values near saturation (>0.85 or <0.15)"
      measurement: "count(emx[e] > 0.85 or emx[e] < 0.15 for all e, all NPCs) / (num_npcs × 8)"
      stability_criterion: |
        If saturation is high (>0.3), emotions are skewed toward extremes = resonance/oscillation.
        If saturation is low (<0.05), emotions are well-centered = damped regime.
        Baseline should show moderate saturation, indicating balanced coupling.
      acceptable_range: "[0.08, 0.25] (moderate heterogeneity, not frozen nor chaotic)"
      
    - metric: "zone_atmosphere_mass"
      description: "Total emotional 'charge' in zone atmosphere across all zones"
      measurement: "sum(zone_atm[z][e] for all z, e)"
      stability_criterion: |
        Should remain bounded and oscillate around a quasi-steady mean.
        If mass grows unbounded, emissions exceed decay = instability.
        If mass crashes to zero, all emotions are suppressed = under-coupling.
      acceptable_range: |
        Oscillations with amplitude 10–30% of mean.
        No systematic drift upward or downward over 1000+ ticks.
      
    - metric: "stress_distribution"
      description: "Mean stress level across all NPCs"
      measurement: "mean(stress[npc]) and std(stress[npc])"
      stability_criterion: |
        Should be stationary (not continuously rising, not stuck at zero).
        High variance indicates heterogeneous experiences (some NPCs thriving, some struggling).
        Low variance indicates uniform condition (possible synchronization).
      acceptable_range: |
        Mean stress: 30–60 (moderate, sustainable)
        Std stress: 15–35 (healthy variance)
        No trending upward over 1000+ ticks (would indicate instability).
      
    - metric: "energy_distribution"
      description: "Mean and variance of energy levels"
      measurement: "mean(energy[npc]) and std(energy[npc])"
      stability_criterion: |
        Should be stationary and never approach critical thresholds (< 25) systematically.
        NPCs who are working should maintain energy > 40; those at HOME recover.
      acceptable_range: |
        Mean energy: 45–70 (comfortable, not desperate)
        Std energy: 15–30 (variance from zone choice, fatigue state)
      
    - metric: "zone_fatigue_lockup_rate"
      description: "Fraction of NPCs currently in a locked zone"
      measurement: "(count(locked_zone != None) / num_npcs) per observation window"
      stability_criterion: |
        Should oscillate between lock and unlock cycles.
        High rate (>0.3) indicates zones are congested and driving locks.
        Low rate (<0.05) indicates locks are rare (possible under-coupling of fatigue).
        Baseline should show locks happening regularly but not constantly.
      acceptable_range: "[0.08, 0.25] (locks occur, are resolved, cycle repeats)"
      
  stable_response_to_perturbation:
    
    - perturbation_type: "Conceptual stress bump"
      description: |
        Imagine injecting a known stress increase into one NPC (+30 stress).
        Expected response: that NPC's Anger/Sadness rise → zone selection becomes restricted
        (DEV/TRADE blocked) → NPC forced toward HOME/FLEX → stress recovers within 50–100 ticks.
      measurement: "Return to baseline stress range (no permanent elevation)"
      criterion: |
        After 150 ticks, stress should return to ±5 of pre-perturbation mean.
        If stress never recovers, system is unstable or under-coupled.
        If recovery is <50 ticks, system is over-damped (no oscillation).
      expected_behavior: "Oscillatory return with 50–100 tick period; exponential decay envelope."
      
    - perturbation_type: "Temporary zone closure"
      description: |
        Conceptually, one zone becomes unavailable (energy cost raises, or popularity crashes).
        Expected response: NPCs redistribution to other zones → congestion elsewhere
        → market demand jitter creates temporary peaks in unaffected zones
        → population spreads back out over 100–300 ticks.
      measurement: "Return to baseline density distribution"
      criterion: |
        After 50 ticks in a 5-zone system, all zones should have re-equilibrated.
        No zone should remain empty or saturated permanently.
      
  no_hidden_activation_of_dormant_engines:
    
    - engine: "Event_Engine"
      check: "No event multipliers are applied to work deltas"
      monitoring: "Confirm active_events is populated but not used in compute_work_result"
    
    - engine: "Trust_Social_Engine"
      check: "No NPC-to-NPC influence deltas are non-zero"
      monitoring: "Confirm compute_influence_delta always returns zero InfluenceDelta"
    
    - engine: "Collapse_Engine"
      check: "is_collapsing flag is set and cleared, but causes no stat changes"
      monitoring: "Confirm stress > 90 sets flag; no additional behavioral effects"

################################################################################
# SECTION 6: PRE-IMPLEMENTATION DECISION POINT
################################################################################

required_decisions:
  
  - decision: "Disgust Double Penalty"
    description: |
      The Disgust penalty is applied twice in decide_intent, resulting in
      −2.0×Disgust on the current zone score.
    status: "DECISION_REQUIRED (placeholder)"
    canonical_option: |
      Mark as CANONICAL if:
      - You want this penalty to be part of baseline physics
      - You are aware it shapes churn and lock dynamics significantly
      - You will calibrate fatigue, EMX targets, and zone scoring around it
    artifact_option: |
      Mark as ARTIFACT if:
      - You believe this is an implementation bug (duplicate penalty pass)
      - You want to remove it in post-baseline patches
      - You want to reduce escape-driving and allow longer residence
    
  - decision: "Trust/Social Engine Activation"
    description: |
      The Trust engine is structurally complete but dormant (returns all zeros).
      Current system HAS NO direct NPC-to-NPC influence.
    status: "DECISION_REQUIRED (baseline philosophy)"
    baseline_approach: |
      Current baseline = field-mediated-only coupling (atmosphere).
      All peer dynamics come through shared zone_atmosphere, not trust/reputation.
      This is a valid, though limited, social model.
    activation_decision: |
      If you want reputation propagation, alliance clustering, or trade networks,
      this is post-baseline implementation. For now: DORMANT is baseline.
  
  - decision: "Event Engine Activation"
    description: |
      The Event engine is structurally complete but disconnected (multipliers not applied).
    status: "DECISION_REQUIRED (is it intentional?)"
    baseline_approach: |
      For baseline certification, events are GHOST (defined but have zero effect).
      NPCs can track events but events do not modify work output.
    activation_decision: |
      If you want Market Boom to boost efficiency or Energy Crisis to drain stats,
      this is post-baseline implementation. For now: DORMANT is baseline.

