metadata:
  version: "1.0"
  certification_date: "2026-03-01"
  source_documents:
    - "NPC INFLUENCE & INTERDEPENDENCY MAP1.txt"
    - "npc_got.txt"
  philosophy: |
    This is NOT a design document. This is a *frozen snapshot* of the system
    as it currently exists. Every engine, coupling, and hazard listed here
    is already running in l.py. The purpose is to establish a certified
    baseline before any implementation changes, so we can measure what
    actually changes afterward.
  decision_point:
    The only pre-implementation decision required is whether the "Disgust
    double penalty stacking" is canonical baseline physics or an unintended
    artifact. This certificate lists it as DECISION_REQUIRED.

################################################################################
# SECTION 1: TICK PIPELINE (Immutable System Identity)
################################################################################

# The exact phase order that constitutes one simulation tick.
# This order is a stability determinant. Changing order changes cascade effects.
# All 11 phases execute in this sequence every tick.

tick_pipeline:
  order:
    - phase: "1"
      name: "update_zone_occupancy"
      description: "Traveling: stress +0.003, energy −0.0015. AT_WORK: zone_fatigue++, update zones_visited_this_cycle, zone lock logic."
      affects: [zone_fatigue, stress, energy, state]
      timescale: "per_tick"
      
    - phase: "2"
      name: "update_emx"
      description: "Stats → raw targets → personality sensitivity → dependency shift (using zone atmosphere from last tick) → drift toward target → homeostasis. Surprise spike on zone change."
      affects: [emx_values]
      timescale: "per_tick"
      uses_frozen_state: false
      
    - phase: "3"
      name: "update_atmosphere"
      description: "Decay → emit (npc.emx just updated above) → cancellation → complex detection → absorb back to npc.emx → complex physical effects."
      affects: [zone_atmosphere, emx_values]
      timescale: "per_tick"
      
    - phase: "4"
      name: "update_cell_atmosphere"
      description: "Spatial grid: NPCs emit to their cell, cells diffuse to neighbors, cancel opposites. Absorbed into npc.emx in step 3 already."
      affects: [cell_atmosphere, emx_values]
      timescale: "per_tick"
      
    - phase: "5"
      name: "build_snapshot"
      description: "Frozen view created. All decisions below use THIS frozen state, not live NPC objects — prevents mid-tick mutation."
      affects: [npc_view]
      timescale: "per_tick"
      
    - phase: "6"
      name: "P1_decide_intent"
      description: "AT_HOME only, once per cycle. Uses snapshot. Sets npc.prepared_intent. Skips if AT_WORK, TRAVELING, or already has intent."
      affects: [prepared_intent]
      timescale: "per_tick_conditional"
      uses_frozen_state: true
      
    - phase: "7"
      name: "P2_commit_phase__P3_move_phase"
      description: "Converts prepared_intent into CommitmentPlan + MovementResult. Only for AT_HOME NPCs with intent."
      affects: [commitment, state]
      timescale: "per_tick_conditional"
      uses_frozen_state: true
      
    - phase: "8"
      name: "P4_compute_work_result"
      description: "For all AT_WORK NPCs. Uses snapshot emx for efficiency multiplier. money/energy/stress/skills/factor_skills deltas computed."
      affects: [money, energy, stress, skills, factor_skills]
      timescale: "per_tick"
      uses_frozen_state: true
      
    - phase: "9"
      name: "P5_compute_influence_delta"
      description: "Returns empty InfluenceDelta for every NPC. This is a stub — NPC-to-NPC influence is NOT implemented."
      affects: [none]
      timescale: "per_tick"
      uses_frozen_state: true
      
    - phase: "10"
      name: "P6_compute_collapse_flag"
      description: "stress > 90 → CollapseFlag. Applied in apply_commit_reality: is_collapsing=True. Cleared when stress < 90."
      affects: [is_collapsing, cycle_phase]
      timescale: "per_tick"
      uses_frozen_state: true
      
    - phase: "11"
      name: "P7_apply_commit_reality"
      description: "Writes all buffered results to live NPC objects: movement, work deltas, influence (empty), collapse flags, commitments."
      affects: [state, all_stats, commitments]
      timescale: "per_tick"

  critical_property: |
    The order of phases 2-3 (update_emx BEFORE absorb atmosphere) means
    that emx is influenced by *previous* tick's atmosphere, not current.
    This is a one-tick lag that stabilizes resonance.

