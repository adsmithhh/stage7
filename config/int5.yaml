decision:
  phase_thresholds:
    material_survival: 10.0
    stability_stabilization: 60.0
    energy_exploration: 70.0
  switch_penalty_scale: 0.6
  novelty_bonus: 0.2
  disgust_penalty_multiplier: 2.2  # PATCH_002: Reverted from 1.5 to 1.8 (H1 is CANONICAL; Disgust penalty re-strengthened as population signal)
  energy_loss_rate_work_multiplier: 1.8  # PATCH_003: Aggressive +200% drain to overcome DEVELOPMENT's 2.2 recovery; forces HOME cycles
  home_recovery_bonus: 0.25  # tuned: 0.03 caused collapse (zero multiplier when >21 NPCs at HOME); 2.5 was instant recovery
emx_dependency:
  enabled: true
  coupling: 0.55
  context_gain: 0.95
  field_gain: 0.65
  volatility_gain: 1.2
  homeostasis_rate: 0.00035
  drift_base: 0.0022
  drift_max: 0.014
